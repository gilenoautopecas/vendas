<!DOCTYPE html>
<html>
<head>
    <title>Sistema Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>

<nav class="navbar navbar-dark bg-dark p-3">
    <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">Vendas - Gileno Auto Peças</a>
        <a class="btn btn-success" href="{% url 'nova_venda' %}">Nova Venda</a>
	<a class="btn btn-warning" href="{% url 'produtos' %}">Produtos</a>
	<a class="btn btn-info" href="{% url 'relatorios' %}">Relatórios</a>
        <a href="{% url 'importar_produtos_gdoor' %}"
           class="btn btn-warning"
           onclick="return confirm('Importar produtos do Gdoor agora?');">
            Atualizar Produtos Gdoor
        </a>
    </div>
</nav>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
{% endif %}

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>

</html>
