<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licença - GSales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .licenca-card {
            width: 100%;
            max-width: 440px;
            border-radius: 16px;
            border: none;
            box-shadow: 0 4px 24px rgba(15,23,42,0.10);
        }
        .lock-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }
    </style>
</head>
<body>
    <div class="card licenca-card">
        <div class="card-body p-4 text-center">

            <div class="lock-icon bg-danger-subtle text-danger mx-auto mb-3">
                <i class="bi bi-lock-fill"></i>
            </div>

            <h5 class="fw-bold mb-1">G<span class="text-primary">SALES</span></h5>
            <p class="text-muted small mb-4">Sistema de Vendas</p>

            <div class="alert alert-danger text-start d-flex align-items-start gap-2 mb-4">
                <i class="bi bi-exclamation-triangle-fill mt-1 flex-shrink-0"></i>
                <div>
                    <div class="fw-semibold mb-1">Acesso bloqueado</div>
                    <div class="small">{{ motivo }}</div>
                </div>
            </div>

            <p class="text-muted small mb-0">
                Entre em contato com o suporte para renovar sua licença.
            </p>
            <p class="fw-semibold mt-1 mb-0" style="font-size:0.9rem;">
                <i class="bi bi-whatsapp text-success me-1"></i>
                WhatsApp: (84) 98865-0730
            </p>

        </div>
    </div>
</body>
</html>
