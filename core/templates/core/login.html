<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GSales</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
        }
        .login-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }
        .form-control {
            border-radius: 10px;
        }
        .btn-primary {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-7 col-md-5 col-lg-4">

            <div class="card login-card">
                <div class="card-body p-4">

                    <div class="text-center mb-4">
                        <div class="login-icon bg-primary-subtle text-primary mx-auto mb-3">
                            <i class="bi bi-car-front-fill"></i>
                        </div>
                        <h5 class="fw-semibold mb-0">G<span class="text-primary">SALES</span></h5>
                        <small class="text-muted">Acesse sua conta</small>
                    </div>

                    {% if form.errors %}
                        <div class="alert alert-danger d-flex align-items-center" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <div>Usuário ou senha inválidos.</div>
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{{ next }}">

                        <div class="mb-3">
                            <label class="form-label small text-muted mb-1">Usuário</label>
                            <input type="text" name="username" class="form-control" autofocus required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small text-muted mb-1">Senha</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <button class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right"></i> Entrar
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
