<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração Inicial - GSales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .setup-card {
            width: 100%;
            max-width: 480px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(15, 23, 42, 0.10);
        }

        .step-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
        }

        .step-num {
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .step-done {
            background: #dcfce7;
            color: #16a34a;
        }

        .step-active {
            background: #1d4ed8;
            color: #fff;
        }

        .step-pending {
            background: #f1f5f9;
            color: #94a3b8;
        }

        .divider-step {
            width: 2px;
            height: 20px;
            background: #e5e7eb;
            margin-left: 13px;
        }
    </style>
</head>
<body>
<div class="card setup-card">
    <div class="card-body p-4">

        <!-- Header -->
        <div class="text-center mb-4">
            <div class="step-icon bg-primary-subtle text-primary mx-auto mb-3">
                <i class="bi bi-building-fill-gear"></i>
            </div>
            <h5 class="fw-bold mb-0">G<span class="text-primary">SALES</span></h5>
            <small class="text-muted">Configuração inicial</small>
        </div>

        <!-- Steps -->
        <div class="mb-4 px-1">
            <div class="step-item">
                <div class="step-num step-done"><i class="bi bi-check2"></i></div>
                <div>
                    <div class="fw-semibold small">Login realizado</div>
                    <div class="text-muted" style="font-size:0.75rem;">Usuário autenticado com sucesso</div>
                </div>
            </div>
            <div class="divider-step"></div>
            <div class="step-item">
                <div class="step-num step-active">2</div>
                <div>
                    <div class="fw-semibold small">Criar empresa</div>
                    <div class="text-muted" style="font-size:0.75rem;">Informe o nome do seu negócio</div>
                </div>
            </div>
            <div class="divider-step"></div>
            <div class="step-item">
                <div class="step-num step-pending">3</div>
                <div>
                    <div class="fw-semibold small text-muted">Pronto para usar</div>
                    <div class="text-muted" style="font-size:0.75rem;">Acesso ao sistema liberado</div>
                </div>
            </div>
        </div>

        <hr class="mb-4">

        <!-- Formulário -->
        <form method="post">
            {% csrf_token %}

            {% if erro %}
            <div class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3">
                <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
                <div class="small">{{ erro }}</div>
            </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label fw-semibold small">Nome da empresa</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="bi bi-building text-muted"></i></span>
                    <input
                        type="text"
                        name="nome"
                        class="form-control"
                        placeholder="Ex: Gileno Auto Peças"
                        autofocus
                        required
                    >
                </div>
                <div class="form-text">Este nome vai aparecer no sistema. Pode ser alterado depois.</div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-semibold">
                <i class="bi bi-arrow-right-circle me-2"></i>
                Criar empresa e entrar
            </button>
        </form>

    </div>
</div>
</body>
</html>
