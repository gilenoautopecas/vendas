{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-12 col-md-8 col-lg-6">
        
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-white border-0 pt-4 pb-0">
                <h4 class="card-title fw-bold text-primary mb-0">✏️ Editar Produto</h4>
            </div>
            
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Código Gdoor</label>
                        <input type="text" class="form-control bg-light" value="{{ produto.codigo_gdoor|default:'Não possui' }}" disabled>
                        <small class="text-muted">O código do Gdoor não pode ser alterado manualmente.</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nome do Produto</label>
                        <input type="text" name="nome" value="{{ produto.nome }}" class="form-control form-control-lg" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Preço Padrão (R$)</label>
                        <input type="number" step="0.01" name="preco_padrao" value="{{ produto.preco_padrao|stringformat:'s' }}" class="form-control form-control-lg" required>
                    </div>

                    <div class="mb-4 form-check form-switch fs-5">
                        <input class="form-check-input" type="checkbox" role="switch" name="ativo" id="ativoCheck" {% if produto.ativo %}checked{% endif %}>
                        <label class="form-check-label ms-2" for="ativoCheck">Produto Disponível para Venda</label>
                    </div>

                    <hr class="text-muted mb-4">

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'produtos' %}" class="btn btn-light btn-lg border">Cancelar</a>
                        <button type="submit" class="btn btn-primary btn-lg px-4">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
