{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">

        <div class="card form-card">
            <div class="card-body p-4">

                <div class="d-flex align-items-center gap-2 mb-4">
                    <div class="stat-icon bg-primary-subtle text-primary">
                        <i class="bi bi-cart-plus"></i>
                    </div>
                    <div>
                        <h5 class="mb-0 fw-semibold">Nova Venda</h5>
                        <small class="text-muted">Informe os dados iniciais da venda</small>
                    </div>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label small text-muted mb-1">Forma de pagamento</label>
                        {{ form.forma_pagamento }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label small text-muted mb-1">Observação</label>
                        {{ form.observacao }}
                    </div>

                    <div class="d-flex gap-2">
                        <a class="btn btn-outline-secondary flex-fill" href="{% url 'dashboard' %}">
                            <i class="bi bi-x-lg"></i> Cancelar
                        </a>
                        <button class="btn btn-primary flex-fill">
                            <i class="bi bi-check2"></i> Criar Venda
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
