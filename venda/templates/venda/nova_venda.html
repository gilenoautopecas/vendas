{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

        <div class="card shadow-sm">
            <div class="card-body">

                <h4 class="card-title mb-4">Criar Nova Venda</h4>
                
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Forma de pagamento</label>
                        {{ form.forma_pagamento }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Observação</label>
                        {{ form.observacao }}
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary">Criar Venda</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
<a class="btn btn-danger" href="{% url 'dashboard' %}">Cancelar</a>
{% endblock %}
